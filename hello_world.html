<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>¡Hola Mundo!</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(-45deg, #ff0080, #ff8c00, #40e0d0, #7b2ff7);
    background-size: 400% 400%;
    animation: gradientShift 8s ease infinite;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  h1 {
    font-size: 6vw;
    color: #fff;
    text-shadow:
      0 0 10px #fff,
      0 0 20px #ff00de,
      0 0 30px #ff00de,
      0 0 40px #ff00de;
    animation: bounce 1.6s ease-in-out infinite, colorPulse 3s linear infinite;
    text-align: center;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-25px) scale(1.05); }
  }

  @keyframes colorPulse {
    0% { color: #ffffff; }
    33% { color: #ffe066; }
    66% { color: #66fff2; }
    100% { color: #ffffff; }
  }

  .emoji {
    display: inline-block;
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <h1><span class="emoji">🌎</span> ¡Hola Mundo! <span class="emoji">🚀</span></h1>
</body>
</html>
